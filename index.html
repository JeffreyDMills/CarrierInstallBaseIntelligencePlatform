                <tr className="text-left text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold">
                  <th className="pl-5 pr-3 py-2">Alert</th>
                  <th className="px-3 py-2">Type</th>
                  <th className="px-3 py-2">Territory</th>
                  <th className="px-3 py-2">Severity</th>
                  <th className="px-3 py-2">Owner</th>
                  <th className="pl-3 pr-5 py-2">Created</th>
                </tr>
              </thead>
              <tbody>
                {DATA.alerts.map(al => {
                  const sel = al.id === selectedId;
                  return (
                    <tr key={al.id} onClick={() => setSelectedId(al.id)} className={`border-t border-slate-100 cursor-pointer ${sel ? 'bg-carrier-blue/[0.05]' : 'hover:bg-slate-50/60'}`}>
                      <td className="pl-5 pr-3 py-3 whitespace-nowrap">
                        <div className={`tabular font-semibold ${sel ? 'text-carrier-blue' : 'text-slate-900'}`}>{al.id}</div>
                        <div className="text-[11px] text-slate-500 tabular">{al.unit}</div>
                      </td>
                      <td className="px-3 py-3 text-slate-900">
                        <div>{al.type}</div>
                        <div className="text-[11px] text-slate-500">{al.account}</div>
                      </td>
                      <td className="px-3 py-3 text-slate-700">{al.territory}</td>
                      <td className="px-3 py-3"><Pill className={severityColor(al.severity)}>{al.severity}</Pill></td>
                      <td className="px-3 py-3 text-slate-700">{al.owner}</td>
                      <td className="pl-3 pr-5 py-3 text-[11px] text-slate-500 tabular">{al.created}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </SectionCard>

        {/* Alert detail drawer */}
        <div className="col-span-5 space-y-4">
          <div className="bg-white ring-1 ring-slate-200 rounded-lg p-5">
            <div className="flex items-start gap-4">
              <div className="h-11 w-11 rounded-md bg-rose-50 flex items-center justify-center shrink-0">
                <Icon name="alert" className="w-5 h-5 text-rose-600"/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <div className="text-[14px] font-semibold text-slate-900 tabular">{a.id}</div>
                  <Pill className={severityColor(a.severity)}>{a.severity}</Pill>
                </div>
                <div className="text-[13px] text-slate-800 mt-1">{a.type}</div>
                <div className="text-[11px] text-slate-500 mt-0.5">{a.account} · {a.territory}</div>
              </div>
            </div>

            <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 gap-4 text-[12px]">
              <div>
                <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold">Linked Unit</div>
                <div className="text-slate-900 tabular font-semibold mt-0.5">{a.unit}</div>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold">Owner</div>
                <div className="text-slate-900 font-medium mt-0.5">{a.owner}</div>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold">Created</div>
                <div className="text-slate-900 tabular mt-0.5">{a.created}</div>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold">Status</div>
                <div className="text-slate-900 font-medium mt-0.5">{a.status}</div>
              </div>
            </div>

            <div className="mt-4 pt-4 border-t border-slate-100">
              <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold mb-2">Why this fired</div>
              <div className="text-[12px] text-slate-700 leading-relaxed">
                {a.id === 'AL-7001'
                  ? 'Unit health score dropped below 50 following three consecutive cooling performance events in the last 10 days. Unit is on a lapsed service contract with a repeat-fault history consistent with fleet pattern FP-001.'
                  : 'Triggered by the system-defined threshold for this alert type based on the unit or fleet context.'}
              </div>
            </div>

            <div className="mt-4 pt-4 border-t border-slate-100">
              <div className="text-[10px] uppercase tracking-[0.06em] text-slate-500 font-semibold mb-2">Evidence</div>
              <ul className="text-[12px] text-slate-700 space-y-1.5">
                <li className="flex items-start gap-2"><span className="h-1 w-1 rounded-full bg-slate-400 mt-2"/>Health score: 45 (threshold 50)</li>
                <li className="flex items-start gap-2"><span className="h-1 w-1 rounded-full bg-slate-400 mt-2"/>3 performance events in 10 days</li>
                <li className="flex items-start gap-2"><span className="h-1 w-1 rounded-full bg-slate-400 mt-2"/>Fan speed anomaly detected 4h ago</li>
                <li className="flex items-start gap-2"><span className="h-1 w-1 rounded-full bg-slate-400 mt-2"/>Fits FP-001 recurring pattern signature</li>
                <li className="flex items-start gap-2"><span className="h-1 w-1 rounded-full bg-slate-400 mt-2"/>Service contract status: Lapsed</li>
              </ul>
            </div>

            <div className="mt-4 pt-4 border-t border-slate-100 flex items-center gap-2">
              <button className="px-3 py-1.5 bg-carrier-blue text-white text-[12px] font-semibold rounded">{a.next.charAt(0).toUpperCase() + a.next.slice(1)}</button>
              <button className="px-3 py-1.5 bg-white text-slate-700 ring-1 ring-slate-200 text-[12px] font-semibold rounded">Assign owner</button>
              <button className="px-3 py-1.5 bg-white text-slate-700 ring-1 ring-slate-200 text-[12px] font-semibold rounded">Snooze</button>
            </div>
          </div>

          {/* Routing / escalation */}
          <SectionCard title="Routing & Escalation">
            <ol className="space-y-3 text-[12px]">
              {[
                { t: '0 min', who: 'Dealer Manager · Pacific HVAC Alliance', action: 'Alert delivered via SNS + Salesforce Field Service mobile' },
                { t: '+15 min', who: 'Regional Service Manager', action: 'CC if no acknowledgement' },
                { t: '+60 min', who: 'Territory VP', action: 'Escalated on no action' },
                { t: 'auto',   who: 'Quality Lead',  action: 'Tagged if alert fits active fleet pattern (FP-001)' },
              ].map((step, i) => (
                <li key={i} className="flex gap-3">
                  <div className="h-5 w-12 shrink-0 text-right text-[11px] tabular text-slate-500 pt-0.5">{step.t}</div>
                  <div className="relative">
                    <div className="h-2 w-2 rounded-full bg-carrier-blue mt-2"/>
                    {i < 3 && <div className="absolute left-1/2 top-4 -translate-x-1/2 h-[calc(100%+12px)] w-px bg-slate-200"/>}
                  </div>
                  <div className="flex-1 pb-1">
                    <div className="font-semibold text-slate-900">{step.who}</div>
                    <div className="text-[11px] text-slate-600 mt-0.5">{step.action}</div>
                  </div>
                </li>
              ))}
            </ol>
          </SectionCard>
        </div>
      </div>

    </div>
  );
};

/* ============================================================
   PAGE · LEADERSHIP PLACEHOLDERS (Q2 release)
============================================================ */

        <Icon name="bar" className="w-5 h-5 text-carrier-gold"/>
      </div>
      <div className="flex-1">
        <div className="text-[17px] font-semibold">{title}</div>
        <div className="text-slate-300 text-[13px] leading-relaxed mt-1 max-w-3xl">{copy}</div>
      </div>
      <div className="text-right shrink-0">
        <div className="text-[10px] uppercase tracking-[0.1em] text-slate-400">Release</div>
        <div className="text-[15px] font-semibold mt-1">Q2 2026</div>
      </div>
    </div>
    <div className="grid grid-cols-3 gap-4">
      {items.map((it, i) => (
        <div key={i} className="bg-white ring-1 ring-slate-200 rounded-lg p-5">
          <div className="text-[10px] uppercase tracking-[0.08em] text-slate-500 font-semibold">{it.label}</div>
          <div className="text-[14px] font-semibold text-slate-900 mt-2 leading-snug">{it.title}</div>
          <div className="text-[12px] text-slate-600 mt-2 leading-relaxed">{it.copy}</div>
        </div>
      ))}
    </div>
  </div>
);

   APP

  useEffect(() => { window.scrollTo(0, 0); }, [page]);
  const pages = {

    unit:       <UnitPage />,
    fleet:      <FleetPage />,
    dealer:     <DealerPage />,
    dispatch:   <DispatchPage />,
    alerts:     <AlertsPage />,
    recovery:   <DataRecoveryPage />,
    review:     <ComingSoon
                   title="Executive Review"
                   copy="Monthly aftermarket performance review for Carrier leadership — value realized vs. plan, fleet quality signals, dealer momentum, and next-quarter forecast."
                   items={[
                     { label: 'Cadence',   title: 'Monthly + quarterly', copy: 'Auto-generated narrative on the first business day of each month.' },
                     { label: 'Audience',  title: 'CEO, CFO, COO, SVPs', copy: 'Anchored on the $175.3M Year 1 plan with variance commentary.' },
                     { label: 'Format',    title: 'Read-ahead + live',   copy: 'Pre-meeting PDF + interactive dashboard with drill-down.' },
                   ]}
                 />,
    governance: <ComingSoon
                   title="Policy Governance"
                   copy="Human experts govern the thresholds that drive every alert, parts kit, and contract recommendation. The system supports decisioning — it does not remove accountability."
                   items={[
                     { label: 'Adjudication',  title: 'Confidence + risk thresholds', copy: 'Auto-action thresholds reviewed quarterly by service ops + risk.' },
                     { label: 'Anomaly',       title: 'Sensitivity windows',          copy: 'Lookback periods + variance triggers reviewed by quality.' },
                     { label: 'Audit trail',   title: 'Every change logged',          copy: 'Versioned approvals, governance notes, and rollback path.' },
                   ]}

  return (
